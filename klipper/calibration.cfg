[tools_calibrate]
pin: ^PD11        #对刀器引脚
travel_speed: 15  # 探测速度
spread: 4.5         # 探测范围
lower_z: 0.5      # 下压距离
speed: 2          # 每次探测触发之间的回撤速度 (mm/s)
lift_speed: 4     # 探测完成后的 Z 轴抬升速度。注意：其配置的抬升高度必须大于各个工具头之间的 Z 轴物理高度差
final_lift_z: 1   # 最终完成探测后的 Z 轴安全抬升高度
sample_retract_dist: 2  # 每次探测后回撤的距离 (mm)
samples_tolerance: 0.1 # 多次探测结果的容差范围，超出则重试或报错
samples: 5              # 探测采样次数
samples_result: median  # 采样结果的计算方式：median（取中位数）或 average（取平均值）

[gcode_macro _TOOL_CALIB_VARS]
variable_sensor_x: 112      # 校准传感器的中心X坐标
variable_sensor_y: -6.5      # 校准传感器的中心Y坐标
variable_safe_x: 112         # 换刀/待机的安全区域X
variable_safe_y: 10.0         # 换刀/待机的安全区域Y
variable_safe_z: 10.0         # 换刀/待机的安全区域Z高度
variable_tool_count: 23       # 工具总数 (例如0, 1，共2个)
gcode:
    # 此处无需指令，仅用于存储变量
# ---------------------------------------------------------
# 校准单个工具
# 调用示例: CALIBRATE_TOOL TOOL=1
# ---------------------------------------------------------
[gcode_macro CALIBRATE_TOOL]
gcode:
    {% set tool = params.TOOL|default(0)|int %}
    {% set vars = printer["gcode_macro _TOOL_CALIB_VARS"] %}
    
    # 1. 移动到安全区域
    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000
    
    # 2. 切换到目标工具
    T{tool}
    
    # 3. 移动到安全区域
    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000

    # 4. 移动到校准器上方的大致中心位置
    G1 X{vars.sensor_x} Y{vars.sensor_y} F9000
    
    # 5. 执行校准逻辑
    # 如果是T0，作为基准点；如果是其他，则进行相对偏移校准
    {% if tool == 0 %}
        {action_respond_info("正在校准 T0 基准点...")}
        TOOL_LOCATE_SENSOR
    {% else %}
        {action_respond_info("正在校准 T" ~ tool ~ " 的偏移量...")}
        TOOL_CALIBRATE_TOOL_OFFSET
    {% endif %}
    
    # 6. 回到安全区域
    G1 X{vars.safe_x} Y{vars.safe_y} Z{vars.safe_z} F9000

    # 7. 释放当前工具
    UNTOOL

# ---------------------------------------------------------
# 批量校准所有工具
# ---------------------------------------------------------
[gcode_macro CALIBRATE_ALL_TOOLS]
gcode:
    {% set vars = printer["gcode_macro _TOOL_CALIB_VARS"] %}
    
    {action_respond_info("开始全自动工具校准流程...")}
    
    # 遍历所有工具 (range(0, N) 生成 0 到 N-1)
    {% for t in range(0, vars.tool_count) %}
        CALIBRATE_TOOL TOOL={t}
    {% endfor %}
    
    {action_respond_info("所有工具校准完毕")}